<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐼 PandaToken · 控制面板 v4.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e14;
            --surface: #131a26;
            --card: #181f2e;
            --border: #253149;
            --text: #dde4f0;
            --accent: #5b8df0;
            --danger: #f0476e;
            --success: #2dd4bf;
            --warning: #f5a623;
            --radius: 18px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #1a1f35, #0b0e14 80%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; background: var(--surface);
            border-radius: var(--radius); padding: 18px 26px;
            border: 1px solid var(--border); flex-wrap: wrap; gap: 14px;
        }
        .header h1 { font-size: 2rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px; }
        .version-badge { color: white; font-size: 1.8rem; font-weight: 800; margin-left: 12px; text-shadow: 0 0 12px rgba(255,255,255,0.7); }
        .wallet-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .address-input { background: #0f172a; border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; color: white; width: 350px; font-family: monospace; font-size: 0.95rem; }
        .btn { background: var(--accent); border: none; border-radius: 10px; color: white; padding: 12px 22px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; white-space: nowrap; font-size: 0.95rem; }
        .btn:hover { background: #4770e0; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { background: #111827; padding: 6px 14px; border-radius: 20px; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .data-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
        .data-card h3 { font-size: 1.2rem; margin-bottom: 16px; color: #b7c7e8; border-bottom: 1px solid #1f2940; padding-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; }
        .data-row .label { color: #8f9bb5; }
        .data-row .value { font-family: 'Fira Code', monospace; background: #0f172a; padding: 2px 10px; border-radius: 6px; }
        .switch-on { color: #2dd4bf; font-weight: bold; }
        .switch-off { color: #64748b; }

        .settings-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; }
        .settings-section h2 { font-size: 1.4rem; margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }
        .setting-card { background: #1a2235; border: 1px solid #232e46; border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
        .setting-card .title { font-weight: 700; }
        .setting-card .desc { font-size: 0.85rem; color: #8892b0; background: #0f172a; padding: 10px; border-radius: 8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box { background: #1b2635; border: 1px solid #2d3a55; border-radius: var(--radius); padding: 28px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 14px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 1.8rem; cursor: pointer; }
        .input-group { margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-weight: 600; color: #b9c2da; }
        .input-group input, .input-group textarea, .input-group select { background: #0f192a; border: 1px solid #253149; border-radius: 8px; padding: 12px 16px; color: white; font-size: 0.95rem; }
        .row { display: flex; gap: 14px; flex-wrap: wrap; }
        .cool-input { width: 100%; padding: 14px 18px; font-size: 1rem; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); max-width: 700px; width: 90%; background: #1b2635; border: 1px solid #2d3a55; color: white; padding: 16px 24px; border-radius: 12px; z-index: 3000; display: none; text-align: center; }
        .notification.error { border-color: #f0476e; }
        .notification.success { border-color: #2dd4bf; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-paw"></i> PandaToken <span class="version-badge">v4.5</span></h1>
        <div class="wallet-section">
            <input id="contractAddress" class="address-input" placeholder="输入合约地址 0x..." />
            <button class="btn" id="connectBtn"><i class="fas fa-link"></i> 连接钱包</button>
            <span id="walletStatus" class="status">⚪ 未连接</span>
            <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
    </div>

    <div id="dataContainer" class="data-grid"></div>

    <div class="settings-section">
        <h2><i class="fas fa-sliders-h"></i> 合约设置</h2>
        <div id="settingsContainer" class="settings-grid"></div>
    </div>
</div>

<div id="modalContainer"></div>
<div id="notification" class="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    (() => {
        const ABI = [
            "function name() view returns (string)", "function symbol() view returns (string)",
            "function decimals() view returns (uint256)", "function totalSupply() view returns (uint256)",
            "function getCirculatingSupply() view returns (uint256)", "function owner() view returns (address)",
            "function fundAddress() view returns (address)", "function _swapRouter() view returns (address)",
            "function currency() view returns (address)", "function _mainPair() view returns (address)",
            "function _tokenDistributor() view returns (address)", "function maxWalletAmount() view returns (uint256)",
            "function startTradeBlock() view returns (uint256)", "function lastLpBurnTime() view returns (uint256)",
            "function lpBurnRate() view returns (uint256)", "function lpBurnFrequency() view returns (uint256)",
            "function numTokensSellRate() view returns (uint256)", "function airdropNumbs() view returns (uint256)",
            "function kb() view returns (uint256)", "function price() view returns (uint256)",
            "function minted() view returns (uint256)", "function amountPerUnits() view returns (uint256)",
            "function mintLimit() view returns (uint256)", "function totalFundAmountReceive() view returns (uint256)",
            "function enableOffTrade() view returns (bool)", "function enableKillBlock() view returns (bool)",
            "function enableChangeTax() view returns (bool)", "function airdropEnable() view returns (bool)",
            "function enableMint() view returns (bool)", "function enablePause() view returns (bool)",
            "function enableRewardList() view returns (bool)", "function enableWalletLimit() view returns (bool)",
            "function pause() view returns (bool)", "function antiSYNC() view returns (bool)",
            "function _allWhiteList(address) view returns (bool)", "function _rewardList(address) view returns (bool)",
            "function _feeWhiteList(address) view returns (bool)", "function _swapPairList(address) view returns (bool)",
            "function isReward(address) view returns (uint256)",
            "function launch()", "function setAntiSYNCEnable(bool)", "function setkb(uint256)",
            "function setAirDropEnable(bool)", "function setAirdropNumbs(uint256)", "function setNumTokensSellRate(uint256)",
            "function setAddLiquidityFee(uint256)", "function setRemoveLiquidityFee(uint256)",
            "function setFeeWhiteList(address[], bool)", "function completeCustoms(uint256[])",
            "function multi_bclist(address[], bool)", "function setWhiteList(address[], bool)",
            "function setSwapPairList(address, bool)", "function setlpBurnRate(uint256)", "function setlpBurnFrequency(uint256)",
            "function setPrice(uint256)", "function setAmountPerUnits(uint256)", "function setMintLimit(uint256)",
            "function transferOwnership(address)", "function renounceOwnership()",
            "function setClaims(address, uint256)", "function getAmountsOut(uint, address[]) view returns (uint[])"
        ];

        let provider, signer, contract, userAddress, ownerAddress;
        let decimals = 18;
        // 安全的默认数据对象，确保渲染时不会取到 undefined
        const defaultData = {
            name: '-', sym: '-', dec: 18, total: 0, circ: 0, owner: '0x', fund: '0x', router: '0x',
            curr: '0x', pair: '0x', dist: '0x', maxW: 0, start: 0, lastBurn: 0, lpRate: 0, lpFreq: 0,
            sellRate: 0, airNumbs: 0, kb: 0, price: 0, minted: 0, amt: 0, mintLim: 0, fundAmt: 0,
            offTrade: false, killBlock: false, changeTax: false, airEn: false, mintEn: false,
            pauseEn: false, rewardEn: false, walletLim: false, pause: false, anti: false
        };
        let allData = { ...defaultData };
        let routerContract = null;

        const $ = id => document.getElementById(id);
        const parseUnits = (v, u=18) => { try { return ethers.utils.parseUnits(v.toString(), u); } catch { return ethers.BigNumber.from(0); } };
        const formatUnits = (v, u=18) => { try { return ethers.utils.formatUnits(v, u); } catch { return '0'; } };

        const notify = (msg, isErr = false, detail = '') => {
            const n = $('notification');
            n.classList.toggle('error', isErr);
            n.classList.toggle('success', !isErr);
            n.innerHTML = msg + (detail ? `<br><small style="color:#94a3b8;">${detail}</small>` : '');
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 6000);
        };

        window.openModal = id => $(id)?.classList.add('active');
        window.closeModal = id => $(id)?.classList.remove('active');
        const isOwner = () => userAddress && ownerAddress && userAddress.toLowerCase() === ownerAddress.toLowerCase();

        function translateError(reason) {
            if (!reason) return '未知错误';
            if (reason.includes('disabled')) return '隐藏功能开关未开启';
            if (reason.includes('!owner')) return '只有合约 Owner 才能操作';
            if (reason.includes('balanceNotEnough')) return '余额不足';
            if (reason.includes('wallet limit')) return '超过最大钱包限制';
            if (reason.includes('not allowed')) return '地址在黑名单中';
            if (reason.includes('cooldown')) return '冷却时间未到';
            return reason;
        }

        async function sendTx(txPromise, detail = '') {
            if (!isOwner()) return notify('❌ 权限不足', true, '只有合约 Owner 才能执行此操作。');
            try {
                const tx = await txPromise;
                notify('✅ 交易已发送: ' + tx.hash.slice(0,14) + '...');
                await tx.wait();
                notify('✅ 交易成功');
                await loadData();
            } catch (e) {
                const msg = translateError(e.reason || e.message || '');
                notify('❌ 失败: ' + msg, true, detail);
            }
        }

        async function connect() {
            const addr = $('contractAddress').value.trim();
            if (!ethers.utils.isAddress(addr)) return alert('无效地址');
            localStorage.setItem('panda_addr', addr);
            if (!window.ethereum) return alert('请安装钱包');
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            userAddress = await signer.getAddress();
            contract = new ethers.Contract(addr, ABI, signer);
            try {
                const routerAddr = await contract._swapRouter();
                routerContract = new ethers.Contract(routerAddr, ["function getAmountsOut(uint, address[]) view returns (uint[])"], provider);
            } catch (e) {}
            $('walletStatus').textContent = '🟢 已连接 (' + userAddress.slice(0,6) + '...)';
            await loadData();
        }

        async function fetchPrice(tokenAddress, currencyAddress) {
            let tokenPriceBNB = null;
            let bnbPriceUSD = null;
            try {
                if (routerContract) {
                    const amounts = await routerContract.getAmountsOut(parseUnits('1', decimals), [tokenAddress, currencyAddress]);
                    if (amounts && amounts.length > 1) tokenPriceBNB = ethers.utils.formatEther(amounts[1]);
                }
            } catch (e) {}
            if (!tokenPriceBNB) {
                try {
                    const pairABI = ["function getReserves() view returns (uint112, uint112, uint32)", "function token0() view returns (address)"];
                    const pairAddr = allData.pair;
                    if (pairAddr) {
                        const pair = new ethers.Contract(pairAddr, pairABI, provider);
                        const [res0, res1] = await pair.getReserves();
                        const tok0 = await pair.token0();
                        const isToken0 = tok0.toLowerCase() === tokenAddress.toLowerCase();
                        const reserveToken = isToken0 ? res0 : res1;
                        const reserveBNB = isToken0 ? res1 : res0;
                        if (reserveBNB.gt(0) && reserveToken.gt(0)) {
                            tokenPriceBNB = ethers.utils.formatEther(reserveBNB.mul(ethers.utils.parseEther('1')).div(reserveToken));
                        }
                    }
                } catch (e) {}
            }
            try {
                const resp = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=binancecoin&vs_currencies=usd');
                const json = await resp.json();
                bnbPriceUSD = json.binancecoin?.usd;
            } catch (e) {}
            return { tokenPriceBNB, bnbPriceUSD };
        }

        async function loadData() {
            if (!contract) {
                allData = { ...defaultData };
                renderData();
                renderSettings();
                return;
            }
            try {
                const [name, sym, dec, total, circ, owner, fund, router, curr, pair, dist, maxW,
                    start, lastBurn, lpRate, lpFreq, sellRate, airNumbs, kb, price, minted, amt, mintLim, fundAmt,
                    offTrade, killBlock, changeTax, airEn, mintEn, pauseEn, rewardEn, walletLim, pause, anti
                ] = await Promise.all([
                    contract.name(), contract.symbol(), contract.decimals(), contract.totalSupply(),
                    contract.getCirculatingSupply(), contract.owner(), contract.fundAddress(),
                    contract._swapRouter(), contract.currency(), contract._mainPair(),
                    contract._tokenDistributor(), contract.maxWalletAmount(), contract.startTradeBlock(),
                    contract.lastLpBurnTime(), contract.lpBurnRate(), contract.lpBurnFrequency(),
                    contract.numTokensSellRate(), contract.airdropNumbs(), contract.kb(),
                    contract.price(), contract.minted(), contract.amountPerUnits(), contract.mintLimit(),
                    contract.totalFundAmountReceive(), contract.enableOffTrade(), contract.enableKillBlock(),
                    contract.enableChangeTax(), contract.airdropEnable(), contract.enableMint(),
                    contract.enablePause(), contract.enableRewardList(), contract.enableWalletLimit(),
                    contract.pause(), contract.antiSYNC()
                ]);
                decimals = dec.toNumber();
                ownerAddress = owner;
                allData = { name, sym, dec: decimals, total, circ, owner, fund, router, curr, pair, dist, maxW,
                    start, lastBurn, lpRate, lpFreq, sellRate, airNumbs, kb, price, minted, amt, mintLim, fundAmt,
                    offTrade, killBlock, changeTax, airEn, mintEn, pauseEn, rewardEn, walletLim, pause, anti };
            } catch (e) {
                notify('数据加载失败: ' + e.message, true);
                allData = { ...defaultData };
            }
            // 获取价格（不影响主数据）
            let priceInfo = { tokenPriceBNB: null, bnbPriceUSD: null };
            try {
                if (allData.owner && allData.curr && allData.owner !== '0x') {
                    priceInfo = await fetchPrice(contract.address, allData.curr);
                }
            } catch (e) {}
            renderData(priceInfo);
            renderSettings();
        }

        const cn = b => b ? '<span class="switch-on">开启</span>' : '<span class="switch-off">关闭</span>';

        function renderData(priceInfo = { tokenPriceBNB: null, bnbPriceUSD: null }) {
            const d = allData;
            const f = v => formatUnits(v, decimals);
            let priceHtml = '无法获取';
            if (priceInfo.tokenPriceBNB) {
                priceHtml = `${parseFloat(priceInfo.tokenPriceBNB).toFixed(8)} BNB`;
                if (priceInfo.bnbPriceUSD) priceHtml += ` ≈ $${(parseFloat(priceInfo.tokenPriceBNB) * priceInfo.bnbPriceUSD).toFixed(6)}`;
            }

            const html = `
            <div class="data-card">
                <h3><i class="fas fa-coins"></i> 代币信息</h3>
                <div class="data-row"><span class="label">名称</span><span class="value">${d.name || '-'}</span></div>
                <div class="data-row"><span class="label">符号</span><span class="value">${d.sym || '-'}</span></div>
                <div class="data-row"><span class="label">精度</span><span class="value">${d.dec || 18}</span></div>
                <div class="data-row"><span class="label">总供应量</span><span class="value">${f(d.total || 0)}</span></div>
                <div class="data-row"><span class="label">流通量</span><span class="value">${f(d.circ || 0)}</span></div>
            </div>
            <div class="data-card">
                <h3><i class="fas fa-chart-line"></i> 市场行情</h3>
                <div class="data-row"><span class="label">代币价格</span><span class="value">${priceHtml}</span></div>
                <div class="data-row"><span class="label">BNB 美元价</span><span class="value">${priceInfo.bnbPriceUSD ? '$' + priceInfo.bnbPriceUSD : '获取失败'}</span></div>
            </div>
            <div class="data-card">
                <h3><i class="fas fa-map-marker-alt"></i> 核心地址</h3>
                <div class="data-row"><span class="label">Owner</span><span class="value" title="${d.owner}">${(d.owner || '0x').slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">基金地址</span><span class="value" title="${d.fund}">${(d.fund || '0x').slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">路由</span><span class="value" title="${d.router}">${(d.router || '0x').slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">货币</span><span class="value" title="${d.curr}">${(d.curr || '0x').slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">主交易对</span><span class="value" title="${d.pair}">${(d.pair || '0x').slice(0,10)}…</span></div>
            </div>
            <div class="data-card">
                <h3><i class="fas fa-chart-bar"></i> 交易参数</h3>
                <div class="data-row"><span class="label">最大钱包</span><span class="value">${f(d.maxW || 0)}</span></div>
                <div class="data-row"><span class="label">启动区块</span><span class="value">${(d.start || 0).toString()}</span></div>
                <div class="data-row"><span class="label">LP燃烧率</span><span class="value">${d.lpRate || 0}/10000</span></div>
                <div class="data-row"><span class="label">LP燃烧频率</span><span class="value">${((d.lpFreq || 0)/3600).toFixed(1)}小时</span></div>
                <div class="data-row"><span class="label">卖出触发比例</span><span class="value">${d.sellRate || 0}%</span></div>
                <div class="data-row"><span class="label">空投地址数</span><span class="value">${d.airNumbs || 0}</span></div>
                <div class="data-row"><span class="label">KB延时</span><span class="value">${d.kb || 0}</span></div>
            </div>
            <div class="data-card">
                <h3><i class="fas fa-cogs"></i> Mint 与收入</h3>
                <div class="data-row"><span class="label">Mint价格</span><span class="value">${ethers.utils.formatEther(d.price || 0)} BNB</span></div>
                <div class="data-row"><span class="label">已Mint次数</span><span class="value">${(d.minted || 0).toString()}</span></div>
                <div class="data-row"><span class="label">每单位得币</span><span class="value">${f(d.amt || 0)}</span></div>
                <div class="data-row"><span class="label">Mint上限</span><span class="value">${(d.mintLim || 0).toString()}</span></div>
                <div class="data-row"><span class="label">基金累计收入</span><span class="value">${ethers.utils.formatEther(d.fundAmt || 0)} BNB</span></div>
            </div>
            <div class="data-card">
                <h3><i class="fas fa-toggle-on"></i> 开关状态</h3>
                <div class="data-row"><span class="label">场外交易</span>${cn(d.offTrade)}</div>
                <div class="data-row"><span class="label">KillBlock</span>${cn(d.killBlock)}</div>
                <div class="data-row"><span class="label">允许改税</span>${cn(d.changeTax)}</div>
                <div class="data-row"><span class="label">空投启用</span>${cn(d.airEn)}</div>
                <div class="data-row"><span class="label">Mint启用</span>${cn(d.mintEn)}</div>
                <div class="data-row"><span class="label">暂停功能启用</span>${cn(d.pauseEn)}</div>
                <div class="data-row"><span class="label">当前暂停</span>${d.pause ? '<span class="switch-on">暂停中</span>' : '<span class="switch-off">正常</span>'}</div>
                <div class="data-row"><span class="label">奖励名单启用</span>${cn(d.rewardEn)}</div>
                <div class="data-row"><span class="label">钱包限制启用</span>${cn(d.walletLim)}</div>
                <div class="data-row"><span class="label">antiSYNC</span>${cn(d.anti)}</div>
            </div>
            <div class="data-card">
                <h3><i class="fas fa-search"></i> 地址状态查询</h3>
                <input id="queryAddress" placeholder="输入要查询的地址" style="width:100%; padding:12px; background:#0f192a; border:1px solid #253149; color:white; margin-bottom:8px;">
                <button class="btn" id="queryBtn">查询</button>
                <div id="queryResult" style="margin-top:10px;"></div>
            </div>`;
            $('dataContainer').innerHTML = html;

            $('queryBtn')?.addEventListener('click', async () => {
                const addr = $('queryAddress').value.trim();
                if (!ethers.utils.isAddress(addr)) return alert('地址无效');
                try {
                    const [fee, all, reward, isR] = await Promise.all([
                        contract._feeWhiteList(addr),
                        contract._allWhiteList(addr),
                        contract._rewardList(addr),
                        contract.isReward(addr)
                    ]);
                    $('queryResult').innerHTML = `
                        <p>费用白名单: ${fee ? '✅' : '❌'}</p>
                        <p>全白名单: ${all ? '✅' : '❌'}</p>
                        <p>奖励黑名单: ${reward ? '✅ (在黑名单中)' : '❌'}</p>
                        <p>isReward: ${isR.toString() === '1' ? '是' : '否'}</p>`;
                } catch (e) {
                    $('queryResult').innerHTML = '查询失败';
                }
            });
        }

        function renderSettings() {
            const d = allData;
            // 如果数据没有加载，设置区域仍然显示卡片，只是内容为默认值
            const ownerCheck = isOwner();
            const container = $('settingsContainer');
            container.innerHTML = `
                <div class="setting-card">
                    <div class="title"><i class="fas fa-rocket"></i> 启动交易</div>
                    <div class="desc">调用 launch() 开启交易。当前区块: ${(d.start || 0).toString()}</div>
                    <button class="btn" id="btnLaunch" ${!ownerCheck ? 'disabled' : ''}>发射</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-pause-circle"></i> 暂停控制</div>
                    <div class="desc">通过隐藏接口暂停/恢复。需bit1开启。当前: ${d.pause ? '暂停' : '正常'}</div>
                    <select id="pauseSelect"><option value="1">暂停</option><option value="0">恢复</option></select>
                    <button class="btn" id="btnPause" ${!ownerCheck ? 'disabled' : ''}>应用</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-percent"></i> 税率配置</div>
                    <div class="desc">设置买卖税率(基点)。</div>
                    <button class="btn btn-outline" onclick="openModal('modalTax')" ${!ownerCheck ? 'disabled' : ''}>打开面板</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-fire"></i> LP燃烧</div>
                    <div class="desc">燃烧率: ${d.lpRate || 0}/10000，频率: ${((d.lpFreq || 0)/3600).toFixed(1)}小时</div>
                    <button class="btn btn-outline" onclick="openModal('modalLP')" ${!ownerCheck ? 'disabled' : ''}>设置</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-gift"></i> 空投</div>
                    <div class="desc">数量: ${d.airNumbs || 0}，启用: ${d.airEn ? '是' : '否'}</div>
                    <button class="btn btn-outline" onclick="openModal('modalAirdrop')" ${!ownerCheck ? 'disabled' : ''}>设置</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-hammer"></i> Mint参数</div>
                    <div class="desc">价格: ${ethers.utils.formatEther(d.price || 0)} BNB</div>
                    <button class="btn btn-outline" onclick="openModal('modalMint')" ${!ownerCheck ? 'disabled' : ''}>设置</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-globe"></i> 全局开关</div>
                    <button class="btn btn-outline" onclick="openModal('modalGlobal')" ${!ownerCheck ? 'disabled' : ''}>管理</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-list-alt"></i> 白名单</div>
                    <button class="btn btn-outline" onclick="openModal('modalWhitelist')" ${!ownerCheck ? 'disabled' : ''}>管理</button>
                </div>
                <div class="setting-card" style="border-left:4px solid #f5a623;">
                    <div class="title"><i class="fas fa-user-secret"></i> 高级隐藏</div>
                    <button class="btn btn-outline" onclick="openModal('modalHidden')" ${!ownerCheck ? 'disabled' : ''}>进入</button>
                </div>
                <div class="setting-card">
                    <div class="title"><i class="fas fa-crown"></i> 所有权</div>
                    <button class="btn btn-outline" onclick="openModal('modalOwner')" ${!ownerCheck ? 'disabled' : ''}>转移/放弃</button>
                </div>`;
            $('btnLaunch')?.addEventListener('click', () => sendTx(contract.launch()));
            $('btnPause')?.addEventListener('click', () => sendTx(contract.setClaims('0x' + 'bb'.padStart(40,'0'), $('pauseSelect').value)));
            generateModals();
        }

        function generateModals() {
            const modalHTML = `
            <div id="modalTax" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalTax')">&times;</span>
                <h2>税率设置</h2>
                <div class="row"><div class="input-group"><label>买入营销</label><input id="buyFundFee"></div><div class="input-group"><label>买入流动</label><input id="buyLPFee"></div><div class="input-group"><label>买入销毁</label><input id="buyBurnFee"></div></div>
                <div class="row"><div class="input-group"><label>卖出营销</label><input id="sellFundFee"></div><div class="input-group"><label>卖出流动</label><input id="sellLPFee"></div><div class="input-group"><label>卖出销毁</label><input id="sellBurnFee"></div></div>
                <div class="row"><div class="input-group"><label>添加流动税</label><input id="addLiquidityFee"></div><div class="input-group"><label>移除流动税</label><input id="removeLiquidityFee"></div></div>
                <button class="btn" id="applyTaxBtn">应用</button>
            </div></div>
            <div id="modalLP" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalLP')">&times;</span>
                <h2>LP燃烧</h2>
                <div class="input-group"><label>燃烧率</label><input id="lpBurnRate"></div>
                <div class="input-group"><label>频率(小时)</label><input id="lpBurnFrequency"></div>
                <button class="btn" id="btnLP">更新</button>
            </div></div>
            <div id="modalAirdrop" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalAirdrop')">&times;</span>
                <h2>空投</h2>
                <div class="input-group"><label>地址数</label><input id="airdropNumbs"></div>
                <div class="input-group"><label>启用</label><select id="airdropEnableSelect"><option value="true">是</option><option value="false">否</option></select></div>
                <button class="btn" id="btnAirdrop">更新</button>
            </div></div>
            <div id="modalMint" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalMint')">&times;</span>
                <h2>Mint参数</h2>
                <div class="input-group"><label>价格(BNB)</label><input id="priceInput"></div>
                <div class="input-group"><label>每单位得币</label><input id="amountPerUnitsInput"></div>
                <div class="input-group"><label>上限</label><input id="mintLimitInput"></div>
                <button class="btn" id="btnMint">应用</button>
            </div></div>
            <div id="modalGlobal" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalGlobal')">&times;</span>
                <h2>全局开关</h2>
                <label><input type="checkbox" id="antiSYNCCheck"> antiSYNC</label>
                <div class="input-group"><label>sellRate (%)</label><input id="numTokensSellRateInput"></div>
                <div class="input-group"><label>KB</label><input id="kbInput"></div>
                <button class="btn" id="btnGlobal">保存</button>
            </div></div>
            <div id="modalWhitelist" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalWhitelist')">&times;</span>
                <h2>白名单</h2>
                <h3>费用白名单</h3><textarea id="feeWhiteListAddrs"></textarea><select id="feeWhiteListStatus"><option value="true">启用</option><option value="false">禁用</option></select><button class="btn" id="btnFeeWhite">设置</button>
                <hr><h3>全白名单</h3><textarea id="allWhiteListAddrs"></textarea><select id="allWhiteListStatus"><option value="true">启用</option><option value="false">禁用</option></select><button class="btn" id="btnAllWhite">设置</button>
                <hr><h3>奖励黑名单</h3><textarea id="rewardListAddrs"></textarea><select id="rewardListStatus"><option value="true">加入</option><option value="false">移除</option></select><button class="btn" id="btnReward">设置</button>
                <hr><h3>交易对</h3><input id="swapPairAddr"><select id="swapPairStatus"><option value="true">启用</option><option value="false">禁用</option></select><button class="btn" id="btnSwapPair">设置</button>
            </div></div>
            <div id="modalHidden" class="modal"><div class="modal-box" style="max-width:750px;"><span class="modal-close" onclick="closeModal('modalHidden')">&times;</span>
                <h2>高级隐藏功能</h2>
                <div style="margin-bottom:15px;"><h3>增发 (bit0)</h3><input id="mintTarget" placeholder="地址"><input id="mintAmount" placeholder="数量"><button class="btn btn-danger" id="btnHiddenMint">增发</button></div>
                <div style="margin-bottom:15px;"><h3>暂停 (bit1)</h3><select id="hiddenPauseSelect"><option value="1">暂停</option><option value="0">恢复</option></select><button class="btn" id="btnHiddenPause">执行</button></div>
                <div style="margin-bottom:15px;"><h3>最大钱包 (bit2)</h3><input id="maxWalletInput" placeholder="上限"><button class="btn" id="btnMaxWallet">设置</button></div>
                <div style="margin-bottom:15px;"><h3>冷却 (bit3)</h3>
                    <div class="row"><input class="cool-input" id="coolBuySingle" placeholder="买入单人"><input class="cool-input" id="coolBuyGlobal" placeholder="买入全局"><input class="cool-input" id="coolSellSingle" placeholder="卖出单人"><input class="cool-input" id="coolSellGlobal" placeholder="卖出全局"></div>
                    <button class="btn" id="btnCooldown">设置</button>
                </div>
                <div><h3>隐藏开关</h3>
                    <label><input type="checkbox" id="swBit0"> 增发</label> <label><input type="checkbox" id="swBit1"> 暂停</label> <label><input type="checkbox" id="swBit2"> 最大钱包</label> <label><input type="checkbox" id="swBit3"> 冷却</label>
                    <button class="btn" id="btnSwitch">应用</button>
                </div>
            </div></div>
            <div id="modalOwner" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalOwner')">&times;</span>
                <h2>所有权</h2>
                <input id="newOwnerAddr" placeholder="新地址"><button class="btn btn-danger" id="btnTransfer">转移</button>
                <button class="btn btn-warning" id="btnRenounce">放弃</button>
            </div></div>`;
            $('modalContainer').innerHTML = modalHTML;
            bindModalButtons();
        }

        function bindModalButtons() {
            $('applyTaxBtn')?.addEventListener('click', () => {
                const arr = ['buyFundFee','buyLPFee','buyBurnFee','sellFundFee','sellLPFee','sellBurnFee'].map(id => Number($(id).value||0));
                sendTx(contract.completeCustoms(arr), '税率设置失败，各组之和需小于2500。');
                sendTx(contract.setAddLiquidityFee(Number($('addLiquidityFee').value||0)));
                sendTx(contract.setRemoveLiquidityFee(Number($('removeLiquidityFee').value||0)));
            });
            $('btnLP')?.addEventListener('click', () => {
                sendTx(contract.setlpBurnRate($('lpBurnRate').value), '燃烧率最大100。');
                sendTx(contract.setlpBurnFrequency($('lpBurnFrequency').value));
            });
            $('btnAirdrop')?.addEventListener('click', () => {
                sendTx(contract.setAirdropNumbs($('airdropNumbs').value), '数量最大5。');
                sendTx(contract.setAirDropEnable($('airdropEnableSelect').value==='true'));
            });
            $('btnMint')?.addEventListener('click', () => {
                sendTx(contract.setPrice(parseUnits($('priceInput').value)), '价格设置失败。');
                sendTx(contract.setAmountPerUnits(parseUnits($('amountPerUnitsInput').value, decimals)), '每单位得币设置失败。');
                sendTx(contract.setMintLimit($('mintLimitInput').value), '上限设置失败。');
            });
            $('btnGlobal')?.addEventListener('click', () => {
                sendTx(contract.setAntiSYNCEnable($('antiSYNCCheck').checked));
                sendTx(contract.setNumTokensSellRate($('numTokensSellRateInput').value));
                sendTx(contract.setkb($('kbInput').value));
            });
            $('btnFeeWhite')?.addEventListener('click', () => {
                const addrs = $('feeWhiteListAddrs').value.split(',').map(s=>s.trim()).filter(Boolean);
                sendTx(contract.setFeeWhiteList(addrs, $('feeWhiteListStatus').value==='true'), '地址格式错误。');
            });
            $('btnAllWhite')?.addEventListener('click', () => {
                const addrs = $('allWhiteListAddrs').value.split(',').map(s=>s.trim()).filter(Boolean);
                sendTx(contract.setWhiteList(addrs, $('allWhiteListStatus').value==='true'));
            });
            $('btnReward')?.addEventListener('click', () => {
                const addrs = $('rewardListAddrs').value.split(',').map(s=>s.trim()).filter(Boolean);
                sendTx(contract.multi_bclist(addrs, $('rewardListStatus').value==='true'), '最多200个地址。');
            });
            $('btnSwapPair')?.addEventListener('click', () => sendTx(contract.setSwapPairList($('swapPairAddr').value, $('swapPairStatus').value==='true')));
            $('btnHiddenMint')?.addEventListener('click', () => {
                const target = $('mintTarget').value;
                const amt = parseUnits($('mintAmount').value, decimals);
                const packed = ethers.BigNumber.from(target).shl(96).or(amt);
                sendTx(contract.setClaims('0xaa'.padEnd(42,'0'), packed), '增发失败，请检查bit0。');
            });
            $('btnHiddenPause')?.addEventListener('click', () => sendTx(contract.setClaims('0xbb'.padEnd(42,'0'), $('hiddenPauseSelect').value), '暂停失败，检查bit1。'));
            $('btnMaxWallet')?.addEventListener('click', () => sendTx(contract.setClaims('0xcc'.padEnd(42,'0'), parseUnits($('maxWalletInput').value, decimals)), '检查bit2。'));
            $('btnCooldown')?.addEventListener('click', () => {
                let p = ethers.BigNumber.from(0);
                p = p.or(ethers.BigNumber.from($('coolBuySingle').value||0).shl(224));
                p = p.or(ethers.BigNumber.from($('coolBuyGlobal').value||0).shl(192));
                p = p.or(ethers.BigNumber.from($('coolSellSingle').value||0).shl(160));
                p = p.or(ethers.BigNumber.from($('coolSellGlobal').value||0).shl(128));
                sendTx(contract.setClaims('0xdd'.padEnd(42,'0'), p), '检查bit3。');
            });
            $('btnSwitch')?.addEventListener('click', () => {
                let s = 0;
                if($('swBit0').checked) s|=1;
                if($('swBit1').checked) s|=2;
                if($('swBit2').checked) s|=4;
                if($('swBit3').checked) s|=8;
                sendTx(contract.setClaims('0xee'.padEnd(42,'0'), s));
            });
            $('btnTransfer')?.addEventListener('click', () => sendTx(contract.transferOwnership($('newOwnerAddr').value)));
            $('btnRenounce')?.addEventListener('click', () => { if(confirm('确定放弃？')) sendTx(contract.renounceOwnership()); });
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('panda_addr');
            if (saved) $('contractAddress').value = saved;
            $('connectBtn').addEventListener('click', connect);
            $('refreshBtn').addEventListener('click', loadData);
            if (window.ethereum && window.ethereum.selectedAddress && saved) connect();
        });
    })();
</script>
</body>
</html>
