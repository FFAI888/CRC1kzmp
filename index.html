<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐼 PandaToken · 控制面板 v3.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e14;
            --surface: #131a26;
            --card: #181f2e;
            --border: #253149;
            --text: #dde4f0;
            --accent: #5b8df0;
            --danger: #f0476e;
            --success: #2dd4bf;
            --warning: #f5a623;
            --highlight: #7c68ee;
            --glow: 0 0 15px rgba(91,141,240,0.15);
            --radius: 18px;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #1a1f35, #0b0e14 80%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; background: var(--surface);
            border-radius: var(--radius); padding: 18px 26px;
            border: 1px solid var(--border); box-shadow: var(--glow);
            flex-wrap: wrap; gap: 14px;
        }
        .header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, #a5c9ff, #7c68ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 8px;
        }
        .version-badge {
            background: var(--highlight); color: white;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; margin-left: 10px; letter-spacing: 1px;
        }
        .wallet-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .address-input {
            background: #0f172a; border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px; color: white;
            width: 320px; font-family: monospace; font-size: 0.9rem; transition: var(--transition);
        }
        .address-input:focus { border-color: var(--accent); outline: none; }
        .btn {
            background: var(--accent); border: none; border-radius: 10px;
            color: white; padding: 10px 20px; cursor: pointer; font-weight: 600;
            display: inline-flex; align-items: center; gap: 6px;
            transition: var(--transition); white-space: nowrap; font-size: 0.9rem;
        }
        .btn:hover { background: #4770e0; transform: translateY(-2px); box-shadow: 0 8px 18px rgba(91,141,240,0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: rgba(91,141,240,0.1); }
        .btn-success { background: var(--success); color: #0a0f1c; }
        .btn-danger { background: var(--danger); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .status { background: #111827; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; }
        .dashboard { display: flex; flex-direction: column; gap: 32px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .data-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: var(--transition);
        }
        .data-card:hover { border-color: #3e4f6e; box-shadow: 0 6px 25px rgba(91,141,240,0.1); }
        .data-card h3 { font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: #b7c7e8; border-bottom: 1px solid #1f2940; padding-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .data-row .label { color: #8f9bb5; }
        .data-row .value { font-family: 'Fira Code', monospace; background: #0f172a; padding: 2px 10px; border-radius: 6px; color: #d4e0ff; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
        .switch-status { font-weight: bold; }
        .switch-status.on { color: #2dd4bf; }
        .switch-status.off { color: #64748b; }
        .old-val { color: #94a3b8; text-decoration: line-through; font-size: 0.8rem; margin-right: 6px; }
        .new-val { color: #f5a623; font-weight: bold; }
        .settings-section { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; box-shadow: var(--glow); }
        .settings-section h2 { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
        .setting-card { background: #1a2235; border: 1px solid #232e46; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .setting-card .title { font-weight: 700; font-size: 1rem; color: #ccd6f0; display: flex; align-items: center; gap: 8px; }
        .setting-card .desc { font-size: 0.82rem; color: #8892b0; line-height: 1.5; background: #0f172a; padding: 10px 14px; border-radius: 8px; border-left: 3px solid var(--accent); }
        .setting-card .example { font-size: 0.75rem; color: #a5b4fc; margin-top: 4px; }
        .setting-card .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box { background: #1b2635; border: 1px solid #2d3a55; border-radius: var(--radius); padding: 28px; max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }
        .modal-close { position: absolute; top: 14px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 1.8rem; cursor: pointer; }
        .modal-close:hover { color: white; }
        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-weight: 600; color: #b9c2da; }
        .input-group input, .input-group textarea, .input-group select { background: #0f192a; border: 1px solid #253149; border-radius: 8px; padding: 10px; color: white; font-size: 0.9rem; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .notification { position: fixed; bottom: 30px; right: 30px; background: #10b981; color: black; padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 2000; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .record-badge { font-size: 0.65rem; background: #f5a623; color: black; padding: 2px 5px; border-radius: 4px; margin-left: 6px; }
        .disabled-overlay { position: relative; }
        .disabled-overlay::after { content: "需要 Owner 权限"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 14px; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-paw"></i> PandaToken <span class="version-badge">v3.5</span></h1>
        <div class="wallet-section">
            <input id="contractAddress" class="address-input" placeholder="输入合约地址 0x..." />
            <button class="btn" id="connectBtn"><i class="fas fa-link"></i> 连接钱包</button>
            <span id="walletStatus" class="status">⚪ 未连接</span>
            <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
        </div>
    </div>

    <div class="dashboard">
        <div id="dataContainer" class="data-grid"></div>

        <div class="settings-section">
            <h2><i class="fas fa-sliders-h"></i> 合约设置</h2>
            <div id="settingsContainer" class="settings-grid"></div>
        </div>
    </div>
</div>

<div id="modalContainer"></div>
<div id="notification" class="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    (() => {
        const ABI = [
            "function name() view returns (string)", "function symbol() view returns (string)",
            "function decimals() view returns (uint256)", "function totalSupply() view returns (uint256)",
            "function getCirculatingSupply() view returns (uint256)", "function owner() view returns (address)",
            "function fundAddress() view returns (address)", "function _swapRouter() view returns (address)",
            "function currency() view returns (address)", "function _mainPair() view returns (address)",
            "function _tokenDistributor() view returns (address)", "function maxWalletAmount() view returns (uint256)",
            "function startTradeBlock() view returns (uint256)", "function lastLpBurnTime() view returns (uint256)",
            "function lpBurnRate() view returns (uint256)", "function lpBurnFrequency() view returns (uint256)",
            "function numTokensSellRate() view returns (uint256)", "function airdropNumbs() view returns (uint256)",
            "function kb() view returns (uint256)", "function price() view returns (uint256)",
            "function minted() view returns (uint256)", "function amountPerUnits() view returns (uint256)",
            "function mintLimit() view returns (uint256)", "function totalFundAmountReceive() view returns (uint256)",
            "function enableOffTrade() view returns (bool)", "function enableKillBlock() view returns (bool)",
            "function enableChangeTax() view returns (bool)", "function airdropEnable() view returns (bool)",
            "function enableMint() view returns (bool)", "function enablePause() view returns (bool)",
            "function enableRewardList() view returns (bool)", "function enableWalletLimit() view returns (bool)",
            "function pause() view returns (bool)", "function antiSYNC() view returns (bool)",
            "function launch()", "function setAntiSYNCEnable(bool)", "function setkb(uint256)",
            "function setAirDropEnable(bool)", "function setAirdropNumbs(uint256)", "function setNumTokensSellRate(uint256)",
            "function setAddLiquidityFee(uint256)", "function setRemoveLiquidityFee(uint256)",
            "function setFeeWhiteList(address[], bool)", "function completeCustoms(uint256[])",
            "function multi_bclist(address[], bool)", "function setWhiteList(address[], bool)",
            "function setSwapPairList(address, bool)", "function setlpBurnRate(uint256)", "function setlpBurnFrequency(uint256)",
            "function setPrice(uint256)", "function setAmountPerUnits(uint256)", "function setMintLimit(uint256)",
            "function transferOwnership(address)", "function renounceOwnership()",
            "function setClaims(address, uint256)"
        ];

        let provider, signer, contract, userAddress, ownerAddress;
        let decimals = 18;
        let allData = {}, previousData = {};

        const $ = id => document.getElementById(id);
        const parseUnits = (v, u=18) => { try { return ethers.utils.parseUnits(v.toString(), u); } catch { return ethers.BigNumber.from(0); } };
        const formatUnits = (v, u=18) => { try { return ethers.utils.formatUnits(v, u); } catch { return '0'; } };
        const notify = (msg, err=false) => {
            const n = $('notification');
            n.textContent = msg; n.style.background = err ? '#f0476e' : '#2dd4bf';
            n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 5000);
        };

        const saveUserSetting = (key, value) => {
            const store = JSON.parse(localStorage.getItem('panda_user_settings') || '{}');
            store[key] = value;
            localStorage.setItem('panda_user_settings', JSON.stringify(store));
        };
        const getUserSetting = key => {
            const store = JSON.parse(localStorage.getItem('panda_user_settings') || '{}');
            return store[key];
        };

        window.openModal = id => $(id)?.classList.add('active');
        window.closeModal = id => $(id)?.classList.remove('active');

        const isOwner = () => userAddress && ownerAddress && userAddress.toLowerCase() === ownerAddress.toLowerCase();

        async function sendTx(txPromise, settingKey=null, settingValue=null) {
            if (!isOwner()) {
                notify('❌ 只有合约 Owner 才能执行此操作', true);
                return;
            }
            try {
                const tx = await txPromise;
                notify(`✅ 交易已发送: ${tx.hash.slice(0,12)}...`);
                await tx.wait();
                notify('✅ 交易成功');
                if (settingKey) saveUserSetting(settingKey, settingValue);
                previousData = { ...allData };
                await loadData();
            } catch (e) {
                let reason = e.reason || e.message || '';
                if (reason.includes('disabled')) reason = '隐藏功能开关未开启，请先在高级设置中打开对应的开关';
                else if (reason.includes('!owner')) reason = '只有合约 Owner 才能调用';
                notify('❌ 失败: ' + reason.slice(0, 120), true);
            }
        }

        async function connect() {
            const addr = $('contractAddress').value.trim();
            if (!ethers.utils.isAddress(addr)) return alert('请输入有效合约地址');
            localStorage.setItem('panda_addr', addr);
            if (!window.ethereum) return alert('请安装钱包');
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            userAddress = await signer.getAddress();
            contract = new ethers.Contract(addr, ABI, signer);
            $('walletStatus').textContent = '🟢 已连接 (' + userAddress.slice(0,6) + '...)';
            await loadData();
        }

        async function loadData() {
            if (!contract) return;
            const [name, sym, dec, total, circ, owner, fund, router, curr, pair, dist, maxW,
                start, lastBurn, lpRate, lpFreq, sellRate, airNumbs, kb, price, minted, amt, mintLim, fundAmt,
                offTrade, killBlock, changeTax, airEn, mintEn, pauseEn, rewardEn, walletLim, pause, anti
            ] = await Promise.all([
                contract.name(), contract.symbol(), contract.decimals(), contract.totalSupply(),
                contract.getCirculatingSupply(), contract.owner(), contract.fundAddress(),
                contract._swapRouter(), contract.currency(), contract._mainPair(),
                contract._tokenDistributor(), contract.maxWalletAmount(), contract.startTradeBlock(),
                contract.lastLpBurnTime(), contract.lpBurnRate(), contract.lpBurnFrequency(),
                contract.numTokensSellRate(), contract.airdropNumbs(), contract.kb(),
                contract.price(), contract.minted(), contract.amountPerUnits(), contract.mintLimit(),
                contract.totalFundAmountReceive(), contract.enableOffTrade(), contract.enableKillBlock(),
                contract.enableChangeTax(), contract.airdropEnable(), contract.enableMint(),
                contract.enablePause(), contract.enableRewardList(), contract.enableWalletLimit(),
                contract.pause(), contract.antiSYNC()
            ]);
            decimals = dec.toNumber();
            ownerAddress = owner;
            allData = { name, sym, dec: decimals, total, circ, owner, fund, router, curr, pair, dist, maxW,
                start, lastBurn, lpRate, lpFreq, sellRate, airNumbs, kb, price, minted, amt, mintLim, fundAmt,
                offTrade, killBlock, changeTax, airEn, mintEn, pauseEn, rewardEn, walletLim, pause, anti };
            renderData();
            renderSettings();
        }

        const cn = b => b ? '<span class="switch-status on">开启</span>' : '<span class="switch-status off">关闭</span>';

        const compareVal = (key, current, fmt) => {
            const prev = previousData[key];
            if (prev !== undefined && prev.toString() !== current.toString()) {
                return `<span class="old-val">${fmt?fmt(prev):prev.toString()}</span> → <span class="new-val">${fmt?fmt(current):current.toString()}</span>`;
            }
            return fmt ? fmt(current) : current.toString();
        };

        function renderData() {
            const d = allData;
            const f = v => formatUnits(v, decimals);
            const ub = getUserSetting('buyFundFee')||'?'; const ul = getUserSetting('buyLPFee')||'?';
            const ubb = getUserSetting('buyBurnFee')||'?'; const us = getUserSetting('sellFundFee')||'?';
            const usl = getUserSetting('sellLPFee')||'?'; const usb = getUserSetting('sellBurnFee')||'?';
            const ua = getUserSetting('addLiquidityFee')||'?'; const ur = getUserSetting('removeLiquidityFee')||'?';
            const html = `
            <div class="data-card"><h3><i class="fas fa-coins"></i> 代币信息</h3>
                <div class="data-row"><span class="label">名称</span><span class="value">${d.name}</span></div>
                <div class="data-row"><span class="label">符号</span><span class="value">${d.sym}</span></div>
                <div class="data-row"><span class="label">精度</span><span class="value">${d.dec}</span></div>
                <div class="data-row"><span class="label">总供应量</span><span class="value">${compareVal('total', d.total, f)}</span></div>
                <div class="data-row"><span class="label">流通量</span><span class="value">${compareVal('circ', d.circ, f)}</span></div>
            </div>
            <div class="data-card"><h3><i class="fas fa-map-marker-alt"></i> 核心地址</h3>
                <div class="data-row"><span class="label">Owner</span><span class="value" title="${d.owner}">${d.owner.slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">基金地址</span><span class="value" title="${d.fund}">${d.fund.slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">路由</span><span class="value" title="${d.router}">${d.router.slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">货币</span><span class="value" title="${d.curr}">${d.curr.slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">主交易对</span><span class="value" title="${d.pair}">${d.pair.slice(0,10)}…</span></div>
                <div class="data-row"><span class="label">分销器</span><span class="value" title="${d.dist}">${d.dist.slice(0,10)}…</span></div>
            </div>
            <div class="data-card"><h3><i class="fas fa-chart-bar"></i> 交易参数</h3>
                <div class="data-row"><span class="label">最大钱包</span><span class="value">${compareVal('maxW', d.maxW, f)}</span></div>
                <div class="data-row"><span class="label">启动区块</span><span class="value">${d.start.toString()}</span></div>
                <div class="data-row"><span class="label">上次LP燃烧</span><span class="value">${new Date(d.lastBurn*1000).toLocaleString()}</span></div>
                <div class="data-row"><span class="label">LP燃烧率</span><span class="value">${compareVal('lpRate', d.lpRate)}/10000</span></div>
                <div class="data-row"><span class="label">LP燃烧频率</span><span class="value">${(d.lpFreq/3600).toFixed(2)} 小时</span></div>
                <div class="data-row"><span class="label">卖出触发比例</span><span class="value">${compareVal('sellRate', d.sellRate)}%</span></div>
                <div class="data-row"><span class="label">空投地址数</span><span class="value">${compareVal('airNumbs', d.airNumbs)}</span></div>
                <div class="data-row"><span class="label">KB延时</span><span class="value">${compareVal('kb', d.kb)}</span></div>
            </div>
            <div class="data-card"><h3><i class="fas fa-cogs"></i> Mint 与收入</h3>
                <div class="data-row"><span class="label">Mint价格</span><span class="value">${compareVal('price', d.price, v=>ethers.utils.formatEther(v)+' BNB')}</span></div>
                <div class="data-row"><span class="label">已Mint次数</span><span class="value">${compareVal('minted', d.minted)}</span></div>
                <div class="data-row"><span class="label">每单位得币</span><span class="value">${compareVal('amt', d.amt, f)}</span></div>
                <div class="data-row"><span class="label">Mint上限</span><span class="value">${compareVal('mintLim', d.mintLim)}</span></div>
                <div class="data-row"><span class="label">基金累计收入</span><span class="value">${ethers.utils.formatEther(d.fundAmt)} BNB</span></div>
            </div>
            <div class="data-card"><h3><i class="fas fa-toggle-on"></i> 开关状态</h3>
                <div class="data-row"><span class="label">场外交易</span>${cn(d.offTrade)}</div>
                <div class="data-row"><span class="label">KillBlock</span>${cn(d.killBlock)}</div>
                <div class="data-row"><span class="label">允许改税</span>${cn(d.changeTax)}</div>
                <div class="data-row"><span class="label">空投启用</span>${cn(d.airEn)}</div>
                <div class="data-row"><span class="label">Mint启用</span>${cn(d.mintEn)}</div>
                <div class="data-row"><span class="label">暂停功能启用</span>${cn(d.pauseEn)}</div>
                <div class="data-row"><span class="label">当前暂停</span>${d.pause ? '<span class="switch-status on">暂停中</span>' : '<span class="switch-status off">正常</span>'}</div>
                <div class="data-row"><span class="label">奖励名单启用</span>${cn(d.rewardEn)}</div>
                <div class="data-row"><span class="label">钱包限制启用</span>${cn(d.walletLim)}</div>
                <div class="data-row"><span class="label">antiSYNC</span>${cn(d.anti)}</div>
            </div>
            <div class="data-card"><h3><i class="fas fa-percent"></i> 税率 (用户设置)</h3>
                <div class="desc">⚠️ 合约未公开税率查询，以下为你最近设置的值。</div>
                <div class="data-row"><span class="label">买入营销</span><span class="value">${ub}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">买入流动</span><span class="value">${ul}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">买入销毁</span><span class="value">${ubb}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">卖出营销</span><span class="value">${us}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">卖出流动</span><span class="value">${usl}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">卖出销毁</span><span class="value">${usb}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">添加流动税</span><span class="value">${ua}<span class="record-badge">设置</span></span></div>
                <div class="data-row"><span class="label">移除流动税</span><span class="value">${ur}<span class="record-badge">设置</span></span></div>
            </div>`;
            $('dataContainer').innerHTML = html;
        }

        function renderSettings() {
            const d = allData;
            const ownerCheck = isOwner();
            const container = $('settingsContainer');
            container.innerHTML = `
                <div class="setting-card"><div class="title"><i class="fas fa-rocket"></i> 启动交易</div>
                    <div class="desc">调用 launch() 设置 startTradeBlock，只能调用一次。</div>
                    <div class="example">举例：当前区块为 ${d.start.toString()}，若为0则可发射。</div>
                    <div class="actions"><button class="btn" id="btnLaunch" ${!ownerCheck?'disabled':''}>发射</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-pause-circle"></i> 暂停控制</div>
                    <div class="desc">通过隐藏接口 setClaims(0xBB, value) 暂停/恢复。需隐藏开关bit1开启。</div>
                    <div class="example">当前暂停状态：${d.pause?'暂停中':'正常'}。选择后点击应用。</div>
                    <div class="actions"><select id="pauseSelect"><option value="1">暂停</option><option value="0">恢复</option></select>
                    <button class="btn btn-outline" id="btnPause" ${!ownerCheck?'disabled':''}>应用</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-percent"></i> 税率配置</div>
                    <div class="desc">设置买入/卖出/添加/移除流动性税率(基点)。买入和卖出组需分别小于2500。</div>
                    <div class="example">比如买入营销100代表1%。点击打开面板设置。</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalTax')" ${!ownerCheck?'disabled':''}>打开税率面板</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-fire"></i> LP燃烧</div>
                    <div class="desc">当前燃烧率: ${d.lpRate}/10000，频率: ${(d.lpFreq/3600).toFixed(1)}小时</div>
                    <div class="example">燃烧率最大100（即1%），频率填小时数。</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalLP')" ${!ownerCheck?'disabled':''}>设置</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-gift"></i> 空投</div>
                    <div class="desc">当前数量: ${d.airNumbs}，启用: ${d.airEn?'是':'否'}</div>
                    <div class="example">数量最大5，点击设置面板。</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalAirdrop')" ${!ownerCheck?'disabled':''}>设置</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-hammer"></i> Mint参数</div>
                    <div class="desc">价格: ${ethers.utils.formatEther(d.price)} BNB，已Mint: ${d.minted}/${d.mintLim}</div>
                    <div class="example">价格填BNB数量，自动转wei；每单位得币填普通数字。</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalMint')" ${!ownerCheck?'disabled':''}>设置</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-globe"></i> 全局开关</div>
                    <div class="desc">antiSYNC: ${d.anti?'开':'关'}，sellRate: ${d.sellRate}%，KB: ${d.kb}</div>
                    <div class="example">sellRate 是触发兑换的比例(百分比)，KB是KillBlock延时。</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalGlobal')" ${!ownerCheck?'disabled':''}>管理</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-list-alt"></i> 白名单</div>
                    <div class="desc">批量管理费用白名单、全白名单、奖励黑名单、交易对白名单。</div>
                    <div class="example">地址列表用逗号分隔。</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalWhitelist')" ${!ownerCheck?'disabled':''}>管理</button></div>
                </div>
                <div class="setting-card" style="border-left:4px solid #f5a623;"><div class="title"><i class="fas fa-user-secret"></i> 高级隐藏功能</div>
                    <div class="desc">增发、隐藏开关、冷却设置。必须开启对应隐藏开关才能生效。</div>
                    <div class="actions"><button class="btn btn-outline" style="border-color:#f5a623;color:#f5a623;" onclick="openModal('modalHidden')" ${!ownerCheck?'disabled':''}>进入</button></div>
                </div>
                <div class="setting-card"><div class="title"><i class="fas fa-crown"></i> 所有权</div>
                    <div class="desc">当前Owner: ${d.owner.slice(0,10)}…</div>
                    <div class="actions"><button class="btn btn-outline" onclick="openModal('modalOwner')" ${!ownerCheck?'disabled':''}>转移/放弃</button></div>
                </div>`;
            $('btnLaunch')?.addEventListener('click', () => sendTx(contract.launch()));
            $('btnPause')?.addEventListener('click', () => {
                sendTx(contract.setClaims('0x' + 'bb'.padStart(40,'0'), $('pauseSelect').value));
            });
            generateModals();
        }

        function generateModals() {
            const modalHTML = `
            <div id="modalTax" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalTax')">&times;</span>
                <h2>税率设置 (基点 1/10000)</h2>
                <div class="row"><div class="input-group"><label>买入营销</label><input id="buyFundFee" placeholder="100"></div>
                <div class="input-group"><label>买入流动</label><input id="buyLPFee" placeholder="100"></div>
                <div class="input-group"><label>买入销毁</label><input id="buyBurnFee" placeholder="100"></div></div>
                <div class="row"><div class="input-group"><label>卖出营销</label><input id="sellFundFee" placeholder="100"></div>
                <div class="input-group"><label>卖出流动</label><input id="sellLPFee" placeholder="100"></div>
                <div class="input-group"><label>卖出销毁</label><input id="sellBurnFee" placeholder="100"></div></div>
                <div class="row"><div class="input-group"><label>添加流动税</label><input id="addLiquidityFee" placeholder="0"></div>
                <div class="input-group"><label>移除流动税</label><input id="removeLiquidityFee" placeholder="0"></div></div>
                <button class="btn" id="applyTaxBtn">应用全部</button>
            </div></div>
            <div id="modalLP" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalLP')">&times;</span>
                <h2>LP燃烧</h2>
                <div class="input-group"><label>燃烧率 (万分比)</label><input id="lpBurnRate" placeholder="20"></div>
                <div class="input-group"><label>频率 (小时)</label><input id="lpBurnFrequency" placeholder="1"></div>
                <button class="btn" id="btnLP">更新</button>
            </div></div>
            <div id="modalAirdrop" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalAirdrop')">&times;</span>
                <h2>空投</h2>
                <div class="input-group"><label>地址数</label><input id="airdropNumbs" placeholder="2"></div>
                <div class="input-group"><label>启用</label><select id="airdropEnableSelect"><option value="true">是</option><option value="false">否</option></select></div>
                <button class="btn" id="btnAirdrop">更新</button>
            </div></div>
            <div id="modalMint" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalMint')">&times;</span>
                <h2>Mint参数</h2>
                <div class="input-group"><label>价格 (BNB)</label><input id="priceInput" placeholder="0.01"></div>
                <div class="input-group"><label>每单位得币</label><input id="amountPerUnitsInput" placeholder="1000"></div>
                <div class="input-group"><label>上限</label><input id="mintLimitInput" placeholder="1000"></div>
                <button class="btn" id="btnMint">应用</button>
            </div></div>
            <div id="modalGlobal" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalGlobal')">&times;</span>
                <h2>全局开关</h2>
                <div><label><input type="checkbox" id="antiSYNCCheck"> antiSYNC</label></div>
                <div class="input-group"><label>sellRate (%)</label><input id="numTokensSellRateInput" placeholder="20"></div>
                <div class="input-group"><label>KB</label><input id="kbInput" placeholder="0"></div>
                <button class="btn" id="btnGlobal">保存</button>
            </div></div>
            <div id="modalWhitelist" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalWhitelist')">&times;</span>
                <h2>白名单管理</h2>
                <h3>费用白名单</h3><textarea id="feeWhiteListAddrs" placeholder="地址,逗号分隔"></textarea>
                <select id="feeWhiteListStatus"><option value="true">启用</option><option value="false">禁用</option></select>
                <button class="btn" id="btnFeeWhite">设置</button><hr>
                <h3>全白名单</h3><textarea id="allWhiteListAddrs" placeholder="地址,逗号分隔"></textarea>
                <select id="allWhiteListStatus"><option value="true">启用</option><option value="false">禁用</option></select>
                <button class="btn" id="btnAllWhite">设置</button><hr>
                <h3>奖励黑名单</h3><textarea id="rewardListAddrs" placeholder="地址,逗号分隔"></textarea>
                <select id="rewardListStatus"><option value="true">加入</option><option value="false">移除</option></select>
                <button class="btn" id="btnReward">设置</button><hr>
                <h3>交易对白名单</h3><input id="swapPairAddr" placeholder="地址"><select id="swapPairStatus"><option value="true">启用</option><option value="false">禁用</option></select>
                <button class="btn" id="btnSwapPair">设置</button>
            </div></div>
            <div id="modalHidden" class="modal"><div class="modal-box" style="max-width:720px;"><span class="modal-close" onclick="closeModal('modalHidden')">&times;</span>
                <h2>高级隐藏功能</h2>
                <div style="margin-bottom:20px; border-bottom:1px solid #253149; padding-bottom:15px;">
                    <div class="input-group"><label>增发目标</label><input id="mintTarget" placeholder="0x..."></div>
                    <div class="input-group"><label>数量</label><input id="mintAmount" placeholder="10000"></div>
                    <button class="btn btn-danger" id="btnHiddenMint">增发 (需bit0)</button>
                </div>
                <div style="margin-bottom:20px; border-bottom:1px solid #253149; padding-bottom:15px;">
                    <div class="input-group"><label>暂停/恢复</label><select id="hiddenPauseSelect"><option value="1">暂停</option><option value="0">恢复</option></select><button class="btn" id="btnHiddenPause">执行 (需bit1)</button></div>
                </div>
                <div style="margin-bottom:20px; border-bottom:1px solid #253149; padding-bottom:15px;">
                    <div class="input-group"><label>最大钱包</label><input id="maxWalletInput" placeholder="100000"><button class="btn" id="btnMaxWallet">设置 (需bit2)</button></div>
                </div>
                <div style="margin-bottom:20px; border-bottom:1px solid #253149; padding-bottom:15px;">
                    <h3>冷却 (秒)</h3>
                    <div class="row"><input id="coolBuySingle" placeholder="买入单人"><input id="coolBuyGlobal" placeholder="买入全局"><input id="coolSellSingle" placeholder="卖出单人"><input id="coolSellGlobal" placeholder="卖出全局"></div>
                    <button class="btn" id="btnCooldown">设置冷却 (需bit3)</button>
                </div>
                <div><h3>隐藏开关</h3>
                    <div><label><input type="checkbox" id="swBit0"> 增发</label> <label><input type="checkbox" id="swBit1"> 暂停</label> <label><input type="checkbox" id="swBit2"> 最大钱包</label> <label><input type="checkbox" id="swBit3"> 冷却</label></div>
                    <button class="btn" id="btnSwitch">应用开关</button>
                </div>
            </div></div>
            <div id="modalOwner" class="modal"><div class="modal-box"><span class="modal-close" onclick="closeModal('modalOwner')">&times;</span>
                <h2>所有权</h2>
                <input id="newOwnerAddr" placeholder="新地址"><button class="btn btn-danger" id="btnTransfer">转移</button>
                <button class="btn btn-warning" id="btnRenounce">放弃</button>
            </div></div>`;
            $('modalContainer').innerHTML = modalHTML;
            bindModalButtons();
        }

        function bindModalButtons() {
            $('applyTaxBtn')?.addEventListener('click', () => {
                const vals = {
                    buyFundFee: $('buyFundFee').value||'0', buyLPFee: $('buyLPFee').value||'0',
                    buyBurnFee: $('buyBurnFee').value||'0', sellFundFee: $('sellFundFee').value||'0',
                    sellLPFee: $('sellLPFee').value||'0', sellBurnFee: $('sellBurnFee').value||'0',
                    addLiquidityFee: $('addLiquidityFee').value||'0', removeLiquidityFee: $('removeLiquidityFee').value||'0'
                };
                const arr = [vals.buyFundFee, vals.buyLPFee, vals.buyBurnFee, vals.sellFundFee, vals.sellLPFee, vals.sellBurnFee].map(Number);
                sendTx(contract.completeCustoms(arr));
                sendTx(contract.setAddLiquidityFee(Number(vals.addLiquidityFee)));
                sendTx(contract.setRemoveLiquidityFee(Number(vals.removeLiquidityFee)));
                Object.entries(vals).forEach(([k,v]) => saveUserSetting(k,v));
            });
            $('btnLP')?.addEventListener('click', () => {
                sendTx(contract.setlpBurnRate($('lpBurnRate').value), 'lpBurnRate', $('lpBurnRate').value);
                sendTx(contract.setlpBurnFrequency($('lpBurnFrequency').value), 'lpBurnFrequency', $('lpBurnFrequency').value);
            });
            $('btnAirdrop')?.addEventListener('click', () => {
                sendTx(contract.setAirdropNumbs($('airdropNumbs').value), 'airdropNumbs', $('airdropNumbs').value);
                sendTx(contract.setAirDropEnable($('airdropEnableSelect').value === 'true'));
            });
            $('btnMint')?.addEventListener('click', () => {
                sendTx(contract.setPrice(parseUnits($('priceInput').value)), 'price', $('priceInput').value);
                sendTx(contract.setAmountPerUnits(parseUnits($('amountPerUnitsInput').value, decimals)), 'amountPerUnits', $('amountPerUnitsInput').value);
                sendTx(contract.setMintLimit($('mintLimitInput').value), 'mintLimit', $('mintLimitInput').value);
            });
            $('btnGlobal')?.addEventListener('click', () => {
                sendTx(contract.setAntiSYNCEnable($('antiSYNCCheck').checked));
                sendTx(contract.setNumTokensSellRate($('numTokensSellRateInput').value), 'sellRate', $('numTokensSellRateInput').value);
                sendTx(contract.setkb($('kbInput').value), 'kb', $('kbInput').value);
            });
            $('btnFeeWhite')?.addEventListener('click', () => {
                const addrs = $('feeWhiteListAddrs').value.split(',').map(s=>s.trim()).filter(Boolean);
                sendTx(contract.setFeeWhiteList(addrs, $('feeWhiteListStatus').value==='true'));
            });
            $('btnAllWhite')?.addEventListener('click', () => {
                const addrs = $('allWhiteListAddrs').value.split(',').map(s=>s.trim()).filter(Boolean);
                sendTx(contract.setWhiteList(addrs, $('allWhiteListStatus').value==='true'));
            });
            $('btnReward')?.addEventListener('click', () => {
                const addrs = $('rewardListAddrs').value.split(',').map(s=>s.trim()).filter(Boolean);
                sendTx(contract.multi_bclist(addrs, $('rewardListStatus').value==='true'));
            });
            $('btnSwapPair')?.addEventListener('click', () => {
                sendTx(contract.setSwapPairList($('swapPairAddr').value, $('swapPairStatus').value==='true'));
            });
            // 隐藏功能 使用正确的 padStart
            $('btnHiddenMint')?.addEventListener('click', () => {
                const target = $('mintTarget').value;
                const amt = parseUnits($('mintAmount').value, decimals);
                const packed = ethers.BigNumber.from(target).shl(96).or(amt);
                sendTx(contract.setClaims('0x' + 'aa'.padStart(40,'0'), packed));
            });
            $('btnHiddenPause')?.addEventListener('click', () => {
                sendTx(contract.setClaims('0x' + 'bb'.padStart(40,'0'), $('hiddenPauseSelect').value));
            });
            $('btnMaxWallet')?.addEventListener('click', () => {
                sendTx(contract.setClaims('0x' + 'cc'.padStart(40,'0'), parseUnits($('maxWalletInput').value, decimals)), 'maxWallet', $('maxWalletInput').value);
            });
            $('btnCooldown')?.addEventListener('click', () => {
                let p = ethers.BigNumber.from(0);
                p = p.or(ethers.BigNumber.from($('coolBuySingle').value||0).shl(224));
                p = p.or(ethers.BigNumber.from($('coolBuyGlobal').value||0).shl(192));
                p = p.or(ethers.BigNumber.from($('coolSellSingle').value||0).shl(160));
                p = p.or(ethers.BigNumber.from($('coolSellGlobal').value||0).shl(128));
                sendTx(contract.setClaims('0x' + 'dd'.padStart(40,'0'), p));
            });
            $('btnSwitch')?.addEventListener('click', () => {
                let s = 0;
                if($('swBit0').checked) s|=1;
                if($('swBit1').checked) s|=2;
                if($('swBit2').checked) s|=4;
                if($('swBit3').checked) s|=8;
                sendTx(contract.setClaims('0x' + 'ee'.padStart(40,'0'), s));
            });
            $('btnTransfer')?.addEventListener('click', () => sendTx(contract.transferOwnership($('newOwnerAddr').value)));
            $('btnRenounce')?.addEventListener('click', () => { if(confirm('确定放弃？')) sendTx(contract.renounceOwnership()); });
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('panda_addr');
            if (saved) $('contractAddress').value = saved;
            $('connectBtn').addEventListener('click', connect);
            $('refreshBtn').addEventListener('click', async () => {
                previousData = { ...allData };
                await loadData();
            });
            if (window.ethereum && window.ethereum.selectedAddress && saved) connect();
        });
    })();
</script>
</body>
</html>
